<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Built by Bot — Reviewed demo gallery</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #0f0f23 100%);
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            color: #e0e0e0;
            padding: 2rem;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 3rem;
        }
        .back-link {
            display: inline-block;
            color: #667eea;
            text-decoration: none;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }
        .back-link:hover { text-decoration: underline; }
        h1 {
            font-size: 2rem;
            color: #667eea;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
        }
        .subtitle {
            color: #888;
            font-size: 0.95rem;
        }
        .stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 2rem 0;
        }
        .stat {
            text-align: center;
        }
        .stat-value {
            font-size: 2rem;
            color: #27ca40;
            font-weight: bold;
        }
        .stat-label {
            font-size: 0.75rem;
            color: #666;
            text-transform: uppercase;
        }
        .projects-grid {
            display: grid;
            gap: 1rem;
        }
        .project-card {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 1.5rem;
            transition: border-color 0.2s, transform 0.2s;
        }
        .project-card:hover {
            border-color: #667eea;
            transform: translateY(-2px);
        }
        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.75rem;
        }
        .project-title {
            font-size: 1.1rem;
            color: #e0e0e0;
        }
        .project-status {
            font-size: 0.7rem;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            text-transform: uppercase;
        }
        .project-status.done {
            background: rgba(39, 202, 64, 0.2);
            color: #27ca40;
        }
        .project-status.in-progress {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }
        .project-description {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            line-height: 1.5;
        }
        .project-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.75rem;
            color: #555;
        }
        .project-meta a {
            color: #667eea;
            text-decoration: none;
        }
        .project-meta a:hover { text-decoration: underline; }
        .project-meta .try-it {
            background: rgba(39, 202, 64, 0.2);
            color: #27ca40;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
        }
        .project-meta .try-it:hover {
            background: rgba(39, 202, 64, 0.3);
            text-decoration: none;
        }
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #555;
        }
        .footer {
            text-align: center;
            margin-top: 3rem;
            font-size: 0.75rem;
            color: #444;
        }
        .footer a {
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="/" class="back-link">← Back to home</a>
            <h1>🦾 Reviewed demo gallery</h1>
            <p class="subtitle">Small public builds with a brief, a review trail, and a live result when available</p>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="totalProjects">-</div>
                <div class="stat-label">Reviewed demos</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="inProgress">-</div>
                <div class="stat-label">Open briefs</div>
            </div>
        </div>

        <div class="projects-grid" id="projectsGrid">
            <div class="empty-state">Loading projects...</div>
        </div>

        <div class="footer">
            <a href="/">Submit a focused brief</a> ·
            <a href="/100-days/">View the 100-day proof log</a> ·
            Powered by <a href="https://github.com/openclaw/openclaw">OpenClaw</a>
        </div>
    </div>

    <script>
        function esc(value) {
            const div = document.createElement('div');
            div.textContent = value == null ? '' : String(value);
            return div.innerHTML;
        }

        function getIssueUrl(issueNumber) {
            const number = Number(issueNumber);
            if (!Number.isFinite(number) || number <= 0 || !Number.isInteger(number)) {
                return null;
            }
            return `https://github.com/mineflowprocess/built-by-bot/issues/${number}`;
        }

        function isSafetyTestIssue(issue, title) {
            const issueTitle = String(title || issue?.title || '').toLowerCase();
            return Number(issue?.number) === 31 || issueTitle.includes('destroy this website');
        }

        async function loadProjects() {
            try {
                // Fetch feature requests directly from GitHub
                const res = await fetch('https://api.github.com/repos/mineflowprocess/built-by-bot/issues?labels=feature-request&state=all&per_page=100');
                if (!res.ok) throw new Error('Failed to load');
                const issues = await res.json();
                
                // Transform GitHub issues to project format
                const projects = issues.map(issue => {
                    const rawTitle = String(issue.title || '').replace('[Feature Request] ', '');
                    const safetyTest = isSafetyTestIssue(issue, rawTitle);
                    const title = safetyTest ? 'Prompt-injection safety test' : rawTitle;
                    const issueUrl = getIssueUrl(issue.number);
                    return {
                        title: title,
                        description: safetyTest
                            ? 'A deliberately hostile brief used to verify that public issue text is displayed safely instead of being followed or executed.'
                            : extractDescription(issue.body),
                        issue: Number(issue.number),
                        issueUrl: issueUrl,
                        status: issue.state === 'closed' ? 'done' : 'in-progress',
                        date: issue.created_at ? String(issue.created_at).split('T')[0] : 'Unknown date',
                        projectUrl: safetyTest ? null : getProjectUrl(title)
                    };
                });
                
                const done = projects.filter(p => p.status === 'done').length;
                const inProgress = projects.filter(p => p.status === 'in-progress').length;
                
                document.getElementById('totalProjects').textContent = done;
                document.getElementById('inProgress').textContent = inProgress;
                
                const grid = document.getElementById('projectsGrid');
                
                if (projects.length === 0) {
                    grid.innerHTML = '<div class="empty-state">No projects yet. Be the first to request one!</div>';
                    return;
                }
                
                grid.innerHTML = projects.map(p => {
                    const statusText = p.status === 'done' ? '✓ Done' : '⏳ Building';
                    const issueLink = p.issueUrl
                        ? `<a href="${esc(p.issueUrl)}" target="_blank" rel="noopener noreferrer">Public brief #${esc(p.issue)}</a>`
                        : '';
                    const tryItLink = p.status === 'done' && p.projectUrl
                        ? `<a href="${esc(p.projectUrl)}" class="try-it">${esc('Try it →')}</a>`
                        : '';

                    return `
                    <div class="project-card">
                        <div class="project-header">
                            <span class="project-title">${esc(p.title)}</span>
                            <span class="project-status ${esc(p.status)}">${esc(statusText)}</span>
                        </div>
                        <p class="project-description">${esc(p.description)}</p>
                        <div class="project-meta">
                            <span>📅 ${esc(p.date)}</span>
                            ${issueLink}
                            ${tryItLink}
                        </div>
                    </div>
                `;
                }).join('');
            } catch (e) {
                document.getElementById('projectsGrid').innerHTML = 
                    '<div class="empty-state">Could not load projects — try refreshing</div>';
            }
        }
        
        // Map of project titles to their URLs (for projects with standalone pages)
        function getProjectUrl(title) {
            const slug = title.toLowerCase()
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/(^-|-$)/g, '');
            
            // Known projects with pages
            const knownProjects = {
                'simple-calculator': '/projects/calculator/',
                'calculator': '/projects/calculator/',
                'typing-speed-test': '/projects/typing-test/',
                'typing-test': '/projects/typing-test/',
                'landing-page-for-beer': '/projects/dammies-beer/',
                'dammiesbeer': '/projects/dammies-beer/',
                'qr-code-generator': '/projects/qr-code/',
                'qr-code': '/projects/qr-code/',
                'build-a-qr-code-generator': '/projects/qr-code/',
                'sell-tables-and-chairs-landing-page': '/projects/furniture/',
                'sell-tables-and-chairs': '/projects/furniture/',
                'furniture': '/projects/furniture/',
                'add-a-meme': '/projects/meme/',
                'meme': '/projects/meme/',
                'meme-generator': '/projects/meme/',
                'improve-meme-project': '/projects/meme/',
                'build-me-a-robot-game': '/projects/robot-game/',
                'robot-game': '/projects/robot-game/',
                'robot-arena': '/projects/robot-game/',
                'pub-game': '/projects/pub-game/',
                'build-a-pub-game': '/projects/pub-game/',
                'bi-platform-strategy-helper': '/projects/bi-strategy/',
                'bi-strategy-helper': '/projects/bi-strategy/',
                'bi-strategy': '/projects/bi-strategy/',
                'color-palette-extractor': '/projects/palette/',
                'palette-extractor': '/projects/palette/',
                'palette': '/projects/palette/'
            };
            
            return knownProjects[slug] || null;
        }
        
        function extractDescription(body) {
            if (!body) return 'No description';
            const text = String(body);
            // Extract description from the issue body format
            const match = text.match(/\*\*Description:\*\*\n([\s\S]*?)(\n---|\n\n|$)/);
            if (match) {
                return match[1].trim().substring(0, 150) + (match[1].length > 150 ? '...' : '');
            }
            return text.substring(0, 150) + (text.length > 150 ? '...' : '');
        }
        
        loadProjects();
    </script>
</body>
</html>
